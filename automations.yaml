- id: '1737669355677'
  alias: Lock after 30
  description: ''
  trigger:
  - platform: state
    entity_id: lock.touchscreen_deadbolt
    to: unlocked
    for:
      seconds: 30
  condition:
  - condition: state
    entity_id: binary_sensor.front_door_sensor_window_door_is_open
    state: 'off'
  action:
  - service: lock.lock
    target:
      device_id: 7549d9536a0df1258fc38e7bd3b2ae45
  - service: notify.mobile_app_pixel_9_pro_xl
    data:
      message: Front door locked
  mode: single
- id: 49dd66f31a314733a5654bb96d1574e4
  alias: Ring Doorbell - Front Door Actions
  description: Lock door and control lights based on doorbell ring and sun position
  trigger:
  - platform: state
    entity_id: binary_sensor.front_doorbell_ding
    to: 'on'
  action:
  - service: lock.lock
    target:
      entity_id: lock.touchscreen_deadbolt
  - choose:
    - conditions:
      - condition: state
        entity_id: sun.sun
        state: above_horizon
      sequence:
      - service: light.turn_on
        target:
          device_id: e3a8d0af1ac975f40852a6d0c724354b
      - delay:
          minutes: 2
      - service: light.turn_off
        target:
          device_id: e3a8d0af1ac975f40852a6d0c724354b
    - conditions:
      - condition: state
        entity_id: sun.sun
        state: below_horizon
      sequence:
      - service: light.turn_on
        target:
          entity_id:
          - light.hall_light
          - light.porch_light
      - delay:
          seconds: 30
      - service: light.turn_off
        target:
          entity_id:
          - light.hall_light
          - light.porch_light
- id: '1738078626589'
  alias: front_door_unlock
  description: ''
  trigger:
  - platform: state
    entity_id: lock.touchscreen_deadbolt
    from: locked
    to: unlocked
  action:
  - choose:
    - conditions:
      - condition: sun
        before: sunset
        after: sunrise
      sequence:
      - service: light.turn_on
        target:
          device_id: e3a8d0af1ac975f40852a6d0c724354b
    - conditions: []
      sequence:
      - service: light.turn_on
        target:
          device_id:
          - 33973ae92e3432af0497bd2a632d3f3a
          - e3a8d0af1ac975f40852a6d0c724354b
  mode: single
