- id: '1736869556746'
  alias: Lights Sunset Sunrise
  description: Automation based on sunrise/sun set
  trigger:
  - platform: sun
    event: sunset
    id: Sunset
  - platform: sun
    event: sunrise
    id: Sunrise
    offset: +00:15:00
  action:
  - service: light.turn_{{ 'on' if trigger.id == 'Sunset' else 'off' }}
    target:
      entity_id: light.porch_light
  - choose:
    - conditions:
      - condition: trigger
        id:
        - Sunset
      sequence:
      - service: light.turn_on
        target:
          entity_id: light.hall_light
        data:
          brightness_pct: 100
    - conditions:
      - condition: trigger
        id:
        - Sunrise
      sequence:
      - service: light.turn_off
        target:
          entity_id: light.hall_light
    default:
    - service: logbook.log
      data:
        message: 'No Sunrise/Sunset actions (trigger: {{ trigger.id }})'
        name: Lights Sunset Sunrise Automation
        entity_id: sun.sun
- id: '1736963481981'
  alias: Fertigation
  description: ''
  triggers:
  - at: 03:30:00
    trigger: time
  - at: 07:30:00
    trigger: time
  - at: '11:30:00'
    trigger: time
  - at: '15:30:00'
    trigger: time
  actions:
  - target:
      entity_id: switch.tp_link_smart_plug_c82e_feed_pump
    action: switch.turn_on
  - target:
      entity_id: switch.tp_link_smart_plug_c82e_waste_pump
    action: switch.turn_on
  - delay:
      seconds: 20
  - target:
      entity_id: switch.tp_link_smart_plug_c82e_feed_pump
    action: switch.turn_off
  - delay:
      minutes: 2
  - target:
      entity_id: switch.tp_link_smart_plug_c82e_waste_pump
    action: switch.turn_off
  - target:
      entity_id: input_datetime.last_fertigation_time
    data:
      datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
    action: input_datetime.set_datetime
  - data:
      timestamp: '{{ as_timestamp(now()) | int }}'
    action: esphome.reserviorsensor_set_last_fertigation_time
  - data:
      message: Fertigation complete!
    action: notify.mobile_app_pixel_9_pro_xl
  mode: single
