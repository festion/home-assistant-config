- id: '1738256101698'
  alias: front_door_unlocked_scream
  description: ''
  trigger:
  - platform: state
    entity_id: lock.touchscreen_deadbolt
    to: unlocked
    for:
      minutes: 5
  action:
  - service: lock.lock
    target:
      entity_id: lock.touchscreen_deadbolt
  - service: notify.persistent_notification
    data:
      message: Front Door is unlocked!
      title: Front Door unlocked
  - service: notify.mobile_app_pixel_9_pro_xl
    data:
      title: Front Door unlocked
      message: Front Door unlocked!
  - service: notify.mobile_app_pixel_watch_3
    data:
      title: Front Door unlocked
      message: Front Door unlocked
  - service: notify.alexa_media_everywhere
    data:
      message: Front Door unlocked
      title: Front Door unlocked
  - service: input_select.select_option
    target:
      entity_id: input_select.threat_level
    data:
      option: critical
  mode: single
- id: '1738259251934'
  alias: Reduce threat after door lock
  description: ''
  trigger:
  - platform: state
    entity_id: lock.touchscreen_deadbolt
    from: unlocked
    to: locked
  condition:
  - condition: state
    entity_id: input_select.threat_level
    state: critical
  action:
  - service: notify.mobile_app_pixel_9_pro_xl
    data:
      message: Front Door Locked
      title: Front Door Locked
  - service: notify.mobile_app_pixel_watch_3
    data:
      message: Front Door Locked
      title: Front Door Locked
  - service: input_select.select_option
    target:
      entity_id: input_select.threat_level
    data:
      option: high
  mode: single
